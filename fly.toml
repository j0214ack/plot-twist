app = "plot-twist-unwritten-spell"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  ALLOWED_ORIGIN = "https://plot-twist-unwritten-spell.fly.dev"
  SPELL_GENERATION_MODE = "fast"
  OPENAI_TRANSCRIPTION_MODEL = "gpt-4o-transcribe"
  LDO_DATA_DIR = "/data/leave-the-door-open"

[[mounts]]
  source = "ldo_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 30

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
